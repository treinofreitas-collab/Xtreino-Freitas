<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar/Redefinir Senha • ORG Freitas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="assets/images/Logo - Xtreino Freitas.png">
    <meta name="robots" content="noindex,nofollow">
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
            <div class="flex items-center justify-center mb-4">
                <img src="assets/images/Logo - Xtreino Freitas.png" alt="ORG Freitas" class="h-14 w-14 rounded-lg object-contain">
            </div>
            <h1 id="pageTitle" class="text-xl font-bold text-center mb-1">Recuperar Senha</h1>
            <p id="pageSubtitle" class="text-center text-gray-600 text-sm mb-6">Informe seu email para receber o link de recuperação.</p>

            <!-- Solicitar link de recuperação -->
            <div id="requestView" class="space-y-3">
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <input id="reqEmail" type="email" placeholder="seu@email.com" class="w-full border border-gray-300 rounded-lg px-4 py-3">
                <button id="reqBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold transition-colors">Enviar link</button>
                <p class="text-xs text-gray-500 text-center">Verifique também a caixa de spam.</p>
            </div>

            <!-- Redefinir a senha (quando acessado pelo link do email) -->
            <div id="resetView" class="space-y-3 hidden">
                <label class="block text-sm font-medium text-gray-700">Nova senha</label>
                <input id="newPassword" type="password" placeholder="••••••••" class="w-full border border-gray-300 rounded-lg px-4 py-3">
                <label class="block text-sm font-medium text-gray-700">Confirmar nova senha</label>
                <input id="confirmPassword" type="password" placeholder="••••••••" class="w-full border border-gray-300 rounded-lg px-4 py-3">
                <button id="resetBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold transition-colors">Redefinir senha</button>
                <p class="text-xs text-gray-500 text-center">Após redefinir, você será redirecionado para o login.</p>
            </div>

            <p id="msg" class="text-sm text-center mt-4 text-gray-600"></p>

            <div class="mt-6 text-center">
                <a href="index.html" class="text-sm text-blue-700 hover:underline">Voltar ao site</a>
            </div>
        </div>
    </div>

    <script>
        // Reaproveita config já usada no projeto
        window.FIREBASE_CONFIG = {
            apiKey: "AIzaSyANtE6Xd-_SdV0AOZ52T7MXEJ0a-Cksj4w",
            authDomain: "supernatural-51e12.firebaseapp.com",
            projectId: "supernatural-51e12",
            storageBucket: "supernatural-51e12.firebasestorage.app",
            messagingSenderId: "1030063599704",
            appId: "1:1030063599704:web:aff395634cf9828cd2da2d",
            measurementId: "G-WYXXRKDZ7X"
        };
    </script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js';
        import { getAuth, sendPasswordResetEmail, confirmPasswordReset, verifyPasswordResetCode } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js';

        const app = initializeApp(window.FIREBASE_CONFIG);
        const auth = getAuth(app);

        const params = new URLSearchParams(location.search);
        const mode = params.get('mode');
        const oobCode = params.get('oobCode');

        const requestView = document.getElementById('requestView');
        const resetView = document.getElementById('resetView');
        const pageTitle = document.getElementById('pageTitle');
        const pageSubtitle = document.getElementById('pageSubtitle');
        const msg = document.getElementById('msg');

        // Se veio do email (mode=resetPassword), mostrar tela de redefinição
        if (mode === 'resetPassword' && oobCode) {
            requestView.classList.add('hidden');
            resetView.classList.remove('hidden');
            pageTitle.textContent = 'Redefinir Senha';
            pageSubtitle.textContent = 'Defina uma nova senha para sua conta.';

            // Valida o código antes de permitir troca
            verifyPasswordResetCode(auth, oobCode).catch(() => {
                msg.textContent = 'Link inválido ou expirado. Solicite um novo link.';
                resetView.classList.add('hidden');
                requestView.classList.remove('hidden');
                pageTitle.textContent = 'Recuperar Senha';
                pageSubtitle.textContent = 'Informe seu email para receber o link de recuperação.';
            });
        }

        // Enviar link de recuperação
        document.getElementById('reqBtn')?.addEventListener('click', async () => {
            try {
                const email = document.getElementById('reqEmail').value.trim();
                if (!email || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) { msg.textContent = 'Digite um email válido.'; return; }
                const btn = document.getElementById('reqBtn'); btn.disabled = true; btn.textContent = 'Enviando...';
                await sendPasswordResetEmail(auth, email);
                msg.textContent = 'Enviamos um link de recuperação para seu email.';
                btn.disabled = false; btn.textContent = 'Enviar link';
            } catch (e) {
                msg.textContent = (e && e.code ? String(e.code).replace('auth/','').replaceAll('-',' ') : 'Erro ao enviar link.');
                const btn = document.getElementById('reqBtn'); btn.disabled = false; btn.textContent = 'Enviar link';
            }
        });

        // Redefinir senha com o código do email
        document.getElementById('resetBtn')?.addEventListener('click', async () => {
            try {
                const pass = document.getElementById('newPassword').value;
                const pass2 = document.getElementById('confirmPassword').value;
                if (!pass || pass.length < 6) { msg.textContent = 'A senha deve ter ao menos 6 caracteres.'; return; }
                if (pass !== pass2) { msg.textContent = 'As senhas não coincidem.'; return; }
                const btn = document.getElementById('resetBtn'); btn.disabled = true; btn.textContent = 'Redefinindo...';
                await confirmPasswordReset(auth, oobCode, pass);
                msg.textContent = 'Senha redefinida com sucesso! Você será redirecionado ao login.';
                setTimeout(() => { window.location.href = 'index.html'; }, 1500);
            } catch (e) {
                msg.textContent = (e && e.code ? String(e.code).replace('auth/','').replaceAll('-',' ') : 'Erro ao redefinir senha.');
                const btn = document.getElementById('resetBtn'); btn.disabled = false; btn.textContent = 'Redefinir senha';
            }
        });
    </script>
</body>
</html>
